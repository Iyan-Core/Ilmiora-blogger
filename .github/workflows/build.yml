name: Build Ilmiora APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Install project dependencies (skip prepare)
        run: npm install --ignore-scripts

      - name: Add Android platform
        run: cordova platform add android

      - name: Prepare Cordova project
        run: cordova prepare android

      - name: Build APK Release
        run: cordova build android --release -- --packageType=apk

      - name: Rename APK
        run: |
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ilmiora.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilmiora-apk
          path: ilmiora.apk
