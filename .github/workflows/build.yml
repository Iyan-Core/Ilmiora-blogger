name: Build Ilmiora APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Setup Java (FIX ERROR XMLPARSER)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Install Cordova
      - name: Install Cordova CLI
        run: npm install -g cordova

      # 5. Install dependency (skip prepare biar gak error)
      - name: Install dependencies
        run: npm install --ignore-scripts

      # 6. Tambah platform android
      - name: Add Android platform
        run: cordova platform add android

      # 7. Prepare project
      - name: Prepare project
        run: cordova prepare android

      # 8. Build APK
      - name: Build APK Release
        run: cordova build android --release -- --packageType=apk

      # 9. Debug cari APK (biar kelihatan di log)
      - name: Find APK
        run: |
          echo "=== LIST FILE APK ==="
          find . -name "*.apk"

      # 10. Rename APK (AUTO DETECT PATH)
      - name: Rename APK
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "APK ditemukan di: $APK_PATH"
          cp "$APK_PATH" ilmiora.apk

      # 11. Upload APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilmiora-apk
          path: ilmiora.apk
