    konten: `Saya tidak pernah menyangka akan menulis tentang martabak. Tapi setelah tiga tahun gagal membuat martabak yang "benar" di rumah — entah hasilnya terlalu keras, tidak mengembang, atau gosong sebelum matang — akhirnya saya menemukan formula yang konsisten berhasil. Dan saya ingin berbagi karena saya tahu ada banyak orang di luar sana yang juga frustrasi dengan resep martabak yang "mudah" tapi ternyata tidak semudah klaimnya.

BAHAN (untuk 1 loyang ukuran sedang):

Adonan:
- 250 gram tepung terigu protein sedang
- 1 sdt ragi instan
- 2 sdm gula pasir
- 1/4 sdt garam
- 1 butir telur
- 200 ml air hangat (bukan panas — hangat seperti suhu mandi bayi)
- 1/2 sdt baking powder (ditambahkan TERAKHIR, sesaat sebelum masak)

- Mentega secukupnya
- 3 sdm susu kental manis
- 50 gram cokelat meses
- 50 gram keju cheddar parut

CARA MEMBUAT:

1. Campur tepung, ragi, gula, dan garam. Aduk rata dulu sebelum tambah bahan basah.

2. Masukkan telur yang sudah dikocok lepas, lalu tuang air hangat sedikit demi sedikit sambil diaduk. Jangan tuang semua sekaligus — konsistensi adonan tergantung tepungmu, mungkin butuh lebih sedikit atau lebih banyak air. Target: adonan kental seperti pancake batter, bisa mengalir tapi tidak encer.

7. Tutup, masak 8-12 menit. Jangan buka tutup di 5 menit pertama. Martabak matang ketika permukaan tidak lagi basah dan tepinya mulai kecokelatan.

8. Angkat, oles mentega selagi panas, tabur topping, lipat dua.

- Kalau gosong di bawah tapi mentah di atas: api terlalu besar
- Kalau terlalu keras: terlalu lama di cetakan atau adonan terlalu kental

window.startInject = async function() {
  const btn = document.getElementById('injectBtn');
  const logEl = document.getElementById('log');
  const progress = document.getElementById('progress');

  btn.disabled = true;
  btn.textContent = 'Menginjeksi...';
  progress.style.display = 'block';
  logEl.innerHTML = '';

  function addLog(msg, type='info') {
    const el = document.createElement('div');
    el.className = `log-item ${type}`;
    el.textContent = msg;
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  }

  addLog('🔌 Menghubungkan ke Firebase...', 'info');

  let success = 0;
  for(let i = 0; i < DUMMY_ARTICLES.length; i++) {
    const art = DUMMY_ARTICLES[i];
    try {
      const newRef = push(ref(db, 'threads'));
      await set(newRef, art);
      success++;
      addLog(`✓ [${i+1}/5] "${art.judul.substring(0,50)}..." — OK`, 'ok');
    } catch(err) {
      addLog(`✗ [${i+1}/5] Gagal: ${err.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 400));
  }

  progress.style.display = 'none';
  if(success === 5) {
    addLog(`🎉 Semua ${success} artikel berhasil diinjeksi ke Firebase!`, 'ok');
    addLog(`→ Buka mulai-membaca.html dan klik tab Komunitas untuk melihat hasilnya.`, 'warn');
    btn.textContent = `✓ ${success}/5 Artikel Terinjeksi`;
  } else {
    addLog(`⚠️ ${success}/5 artikel berhasil. Cek error di atas.`, 'warn');
    btn.disabled = false;
    btn.textContent = 'Coba Lagi';
  }
};
